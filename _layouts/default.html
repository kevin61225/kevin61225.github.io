<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="{{ page.description | default: site.description | escape }}"
    />
    <link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}" />
    <link rel="shortcut icon" href="{{ '/favicon.ico' | relative_url }}" />
    <title>{{ page.title | default: site.title | escape }}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5efe6;
        --surface: rgba(255, 255, 255, 0.78);
        --text: #1f2937;
        --muted: #5b6675;
        --line: rgba(31, 41, 55, 0.12);
        --accent: #0f766e;
        --shadow: 0 22px 60px rgba(31, 41, 55, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(223, 233, 225, 0.95), transparent 34%),
          radial-gradient(circle at top right, rgba(245, 226, 205, 0.9), transparent 32%),
          linear-gradient(180deg, #faf7f1 0%, var(--bg) 55%, #f1ede5 100%);
      }

      .page {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
      }

      .page::before,
      .page::after {
        content: "";
        position: fixed;
        inset: auto;
        width: 32rem;
        height: 32rem;
        border-radius: 999px;
        filter: blur(36px);
        opacity: 0.35;
        pointer-events: none;
      }

      .page::before {
        top: -8rem;
        left: -10rem;
        background: rgba(15, 118, 110, 0.16);
      }

      .page::after {
        right: -8rem;
        bottom: -10rem;
        background: rgba(139, 92, 246, 0.16);
      }

      .shell {
        width: min(1120px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 1.25rem 0 3rem;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        padding: 1rem 0 1.5rem;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.8rem;
        text-decoration: none;
        color: var(--text);
      }

      .mark {
        width: 2.75rem;
        height: 2.75rem;
        border-radius: 0.95rem;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, var(--accent), #115e59);
        box-shadow: 0 12px 28px rgba(15, 118, 110, 0.25);
      }

      .mark svg {
        width: 1.65rem;
        height: 1.65rem;
        display: block;
      }

      .brand strong {
        display: block;
        font-family: "Trebuchet MS", "Lucida Sans Unicode", sans-serif;
        letter-spacing: 0.04em;
        font-size: 1rem;
      }

      .brand span {
        display: block;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      .nav a,
      .chip,
      .button,
      .link-card {
        border-radius: 999px;
        text-decoration: none;
      }

      .nav a {
        padding: 0.6rem 0.95rem;
        color: var(--text);
        background: rgba(255, 255, 255, 0.56);
        border: 1px solid var(--line);
        backdrop-filter: blur(10px);
      }

      .hero {
        display: grid;
        grid-template-columns: 1.25fr 0.75fr;
        gap: 1.5rem;
        align-items: stretch;
        margin-top: 1rem;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        backdrop-filter: blur(18px);
        border-radius: 1.75rem;
        box-shadow: var(--shadow);
      }

      .hero-main {
        padding: clamp(1.5rem, 4vw, 3.25rem);
        min-height: 28rem;
      }

      .eyebrow {
        display: inline-flex;
        gap: 0.5rem;
        align-items: center;
        padding: 0.45rem 0.85rem;
        border-radius: 999px;
        background: rgba(15, 118, 110, 0.1);
        color: var(--accent);
        font-family: "Trebuchet MS", "Lucida Sans Unicode", sans-serif;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 1rem 0 0.85rem;
        font-family: "Trebuchet MS", "Lucida Sans Unicode", sans-serif;
        font-size: clamp(2.6rem, 7vw, 5.5rem);
        line-height: 0.92;
        letter-spacing: -0.06em;
      }

      .lead {
        max-width: 40rem;
        margin: 0;
        font-size: clamp(1.05rem, 2.2vw, 1.22rem);
        line-height: 1.8;
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem;
        margin-top: 1.8rem;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.95rem 1.2rem;
        font-family: "Trebuchet MS", "Lucida Sans Unicode", sans-serif;
        font-size: 0.95rem;
        font-weight: 700;
        border: 1px solid transparent;
      }

      .button.primary {
        color: #fff;
        background: linear-gradient(135deg, var(--accent), #0f4c5c);
        box-shadow: 0 14px 28px rgba(15, 118, 110, 0.22);
      }

      .button.secondary {
        color: var(--text);
        background: rgba(255, 255, 255, 0.7);
        border-color: var(--line);
      }

      .stats {
        display: grid;
        gap: 1rem;
        padding: 1.4rem;
      }

      .stat {
        padding: 1rem 1rem 1.1rem;
        border-radius: 1.25rem;
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid var(--line);
      }

      .stat strong {
        display: block;
        font-family: "Trebuchet MS", "Lucida Sans Unicode", sans-serif;
        font-size: 1.5rem;
        color: var(--accent);
      }

      .stat span {
        display: block;
        margin-top: 0.35rem;
        color: var(--muted);
        line-height: 1.6;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 1rem;
        margin-top: 1rem;
      }

      .section {
        padding: 1.35rem;
      }

      .section h2 {
        margin: 0 0 0.9rem;
        font-family: "Trebuchet MS", "Lucida Sans Unicode", sans-serif;
        font-size: 1.1rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .section p,
      .section li,
      .section a {
        color: var(--muted);
        line-height: 1.75;
      }

      .about {
        grid-column: span 7;
      }

      .skills {
        grid-column: span 5;
      }

      .projects {
        grid-column: span 7;
      }

      .contact {
        grid-column: span 5;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
      }

      .chip {
        padding: 0.55rem 0.85rem;
        background: rgba(15, 118, 110, 0.08);
        color: var(--accent);
        border: 1px solid rgba(15, 118, 110, 0.14);
        font-family: "Trebuchet MS", "Lucida Sans Unicode", sans-serif;
        font-size: 0.9rem;
      }

      .project-list {
        display: grid;
        gap: 0.9rem;
      }

      .project-search {
        display: grid;
        gap: 0.55rem;
      }

      .project-search-label {
        font-family: "Trebuchet MS", "Lucida Sans Unicode", sans-serif;
        font-size: 0.82rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .project-search-input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 0.75rem;
        background: rgba(255, 255, 255, 0.85);
        color: var(--text);
        padding: 0.65rem 0.8rem;
        font: inherit;
      }

      .project-search-status,
      .project-search-empty {
        margin: 0;
        font-size: 0.92rem;
        color: var(--muted);
      }

      .project-list.compact {
        margin-top: 0.85rem;
      }

      .subsection-title {
        margin: 0 0 0.6rem;
        font-family: "Trebuchet MS", "Lucida Sans Unicode", sans-serif;
        font-size: 0.92rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .more-projects {
        margin-top: 1rem;
        border: 1px solid var(--line);
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.52);
        padding: 0.65rem 0.8rem 0.8rem;
      }

      .more-projects summary {
        cursor: pointer;
        font-family: "Trebuchet MS", "Lucida Sans Unicode", sans-serif;
        font-weight: 700;
        color: var(--text);
      }

      .compact-item {
        padding: 0.85rem 0.95rem;
      }

      .link-card {
        display: block;
        padding: 1rem 1.05rem;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
        color: inherit;
      }

      .project-card {
        border-radius: 1rem;
      }

      .project-repo-link {
        text-decoration: none;
      }

      .project-site-link {
        display: inline-block;
        margin-top: 0.55rem;
        color: var(--accent);
        font-size: 0.92rem;
        text-decoration: none;
        word-break: break-all;
      }

      .project-list [data-project-item][hidden],
      .list [data-project-item][hidden] {
        display: none !important;
      }

      .link-card strong {
        display: block;
        margin-bottom: 0.25rem;
        color: var(--text);
        font-family: "Trebuchet MS", "Lucida Sans Unicode", sans-serif;
      }

      .link-card span {
        color: var(--muted);
      }

      .contact-list {
        display: grid;
        gap: 0.8rem;
      }

      .contact-item {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.9rem 1rem;
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
      }

      .contact-item span:first-child {
        color: var(--text);
        font-family: "Trebuchet MS", "Lucida Sans Unicode", sans-serif;
      }

      .content-card {
        padding: clamp(1.35rem, 4vw, 2.2rem);
      }

      .content-card p,
      .content-card li {
        color: var(--muted);
        line-height: 1.8;
      }

      .content-card h1,
      .content-card h2 {
        margin: 0;
        font-family: "Trebuchet MS", "Lucida Sans Unicode", sans-serif;
      }

      .content-card h1 {
        font-size: clamp(2.2rem, 5vw, 3.8rem);
        line-height: 1;
        letter-spacing: -0.05em;
      }

      .content-card .eyebrow {
        display: inline-block;
        margin-bottom: 0.85rem;
        padding: 0.42rem 0.8rem;
        border-radius: 999px;
        background: rgba(15, 118, 110, 0.1);
        color: var(--accent);
        font-family: "Trebuchet MS", "Lucida Sans Unicode", sans-serif;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .content-card .card {
        margin-top: 1rem;
        padding: 1rem 1.05rem;
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
      }

      .content-card .card strong {
        display: block;
        margin-bottom: 0.3rem;
        color: var(--text);
      }

      .content-card .card .project-search-label {
        margin-top: 0.65rem;
      }

      .content-card .list {
        margin: 1.4rem 0 0;
        padding-left: 1.2rem;
      }

      footer {
        padding: 1.4rem 0 0.5rem;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 860px) {
        .topbar,
        .hero {
          grid-template-columns: 1fr;
          display: grid;
        }

        .topbar {
          align-items: start;
        }

        .hero-main {
          min-height: auto;
        }

        .about,
        .skills,
        .projects,
        .contact {
          grid-column: span 12;
        }
      }

      @media (prefers-reduced-motion: no-preference) {
        .panel,
        .nav a,
        .button,
        .link-card {
          transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease,
            background-color 160ms ease;
        }

        .nav a:hover,
        .button:hover,
        .link-card:hover {
          transform: translateY(-2px);
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <main class="shell">
        <header class="topbar">
          <a class="brand" href="{{ '/' | relative_url }}" aria-label="Kevin Tu resume home">
            <span class="mark" aria-hidden="true">
              <svg viewBox="0 0 64 64" role="img" focusable="false" aria-hidden="true">
                <defs>
                  <linearGradient id="cloudGradient" x1="12" y1="18" x2="52" y2="50" gradientUnits="userSpaceOnUse">
                    <stop offset="0" stop-color="#ffffff" />
                    <stop offset="1" stop-color="#dbeafe" />
                  </linearGradient>
                </defs>
                <g transform="translate(0 4)">
                  <path
                    d="M20 46h25.5c7 0 12.5-5.2 12.5-11.8 0-6.3-5.2-11.4-11.8-11.8-1.7-7-8-12.2-15.6-12.2-8.5 0-15.5 6.5-16 14.8C8 25.8 4 30.3 4 36c0 5.5 4.9 10 11 10h5z"
                    fill="url(#cloudGradient)"
                  />
                </g>
              </svg>
            </span>
            <span>
              <strong>Kevin Tu</strong>
              <span>Resume-style GitHub Pages</span>
            </span>
          </a>
          <nav class="nav" aria-label="Primary">
            <a href="{{ '/#about' | relative_url }}">About</a>
            <a href="{{ '/#projects' | relative_url }}">Projects</a>
            <a href="{{ '/assignment/' | relative_url }}">Assignments</a>
            <a href="{{ '/#contact' | relative_url }}">Contact</a>
          </nav>
        </header>

        {{ content }}

        <footer>
          Built as a GitHub Pages resume landing page.
        </footer>
      </main>
    </div>
    <script>
      document.querySelectorAll("[data-project-search-root]").forEach((root) => {
        const input = root.querySelector("[data-project-search-input]");
        const status = root.querySelector("[data-project-search-status]");
        const empty = root.querySelector("[data-project-search-empty]");
        const items = Array.from(root.querySelectorAll("[data-project-item]"));

        if (!input || items.length === 0) {
          return;
        }

        const filterProjects = () => {
          const query = input.value.trim().toLowerCase();
          let visibleCount = 0;

          items.forEach((item) => {
            const text = [
              item.dataset.projectName || "",
              item.dataset.projectDescription || "",
              item.dataset.projectRepo || "",
              item.dataset.projectSite || "",
            ].join(" ");
            const matched = query.length === 0 || text.includes(query);

            item.hidden = !matched;
            if (matched) {
              visibleCount += 1;
            }
          });

          if (status) {
            status.textContent = "Showing " + visibleCount + " projects";
          }

          if (empty) {
            empty.hidden = visibleCount > 0;
          }
        };

        input.addEventListener("input", filterProjects);
        filterProjects();
      });
    </script>
  </body>
</html>
